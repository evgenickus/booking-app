services:
  backend:
    build: .
    container_name: backend-container
    ports:
      - 8888:8000
    environment:
      - DATABASE_URL=postgresql+psycopg2://user:password@db/booking
      - DATABASE_URL_TEST=postgresql+psycopg2://user:password@db/test_db
    command: ["tests"]
    depends_on:
      - db

  db:
    image: postgres:12.1-alpine
    container_name: database-container
    volumes:
     - postgres_data:/var/lib/postgresql/data/
    environment:
     - POSTGRES_USER=user
     - POSTGRES_PASSWORD=password
     - POSTGRES_DB=booking

volumes:
  postgres_data:
